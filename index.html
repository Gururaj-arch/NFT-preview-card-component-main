<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | NFT preview card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <div class="container">
        <section class="image card__images">
          <div class="active card__images-layer"><img src="images/icon-view.svg" alt="view-icon"></div>
          <img src="images/image-equilibrium.jpg" alt="Equilibrium" />
        </section>

        <section class="content">
          <div class="card__title">
            <h1>Equilibrium #3429</h1>
          </div>
          <p class="desc" id="info">
            Our Equilibrium collection promotes <br />
            balance and calm.
          </p>

          <section class="value-days card__time">
            <p class="value-eth card__time-left">
              <img src="images/icon-ethereum.svg" alt="icon-ethereum" /> <span>0.041 ETH</span>
            </p>

            <p class="days card__time-right">
              <img src="images/icon-clock.svg" alt="clock" /> <span>3 days left</span>
            </p>
          </section>
          <hr />
          <div class="card__creator">
            <p class="creation">
              <img src="images/image-avatar.png" alt="man" /> Creation of
              <span> Jules Wyvern</span>
            </p>
          </div>
        </section>
      </div>
    </main>

    <footer class="attribution">
      Attribution:
      <a href="https://www.crio.do" target="_blank">Crio.Do</a>.
      Coded by
      <a href="https://github.com/Lovegupta112" target="_blank">Love Gupta</a>.
    </footer>
  </body>
</html>
